name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
    
    - name: Download dependencies
      run: go mod download
    
    - name: Build
      run: make build
    
    - name: Test
      run: make test
    
    - name: Vet
      run: go vet ./...
    
    - name: Format check
      run: |
        if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
          echo "Please run 'make fmt' to format your code"
          gofmt -s -l .
          exit 1
        fi
